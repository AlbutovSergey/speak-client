<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Speak — Secure Messenger</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 16px;
        }

        #app {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background: #1a1a1a;
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Auth Styles */
        .auth-container {
            padding: 32px;
            text-align: center;
        }

        .auth-container h2 {
            font-size: 2rem;
            margin-bottom: 24px;
            color: #00ff9d;
        }

        .auth-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 24px;
        }

        .auth-buttons button {
            padding: 10px 20px;
            background: #2a2a2a;
            border: none;
            border-radius: 8px;
            color: #e0e0e0;
            cursor: pointer;
            transition: background 0.2s;
        }

        .auth-buttons button:hover {
            background: #3a3a3a;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 300px;
            margin: 0 auto;
        }

        .auth-form input {
            padding: 12px;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 16px;
        }

        .auth-form input:focus {
            outline: none;
            border-color: #00ff9d;
        }

        .auth-form button {
            padding: 12px;
            background: #00ff9d;
            border: none;
            border-radius: 8px;
            color: #0a0a0a;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .auth-form button:hover {
            opacity: 0.9;
        }

        /* Chat Styles */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .chat-header {
            padding: 16px 20px;
            background: #2a2a2a;
            border-bottom: 1px solid #3a3a3a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h2 {
            font-size: 1.25rem;
            color: #00ff9d;
        }

        .chat-header button {
            padding: 8px 16px;
            background: #dc2626;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 18px;
            word-wrap: break-word;
        }

        .message.own {
            background: #00ff9d;
            color: #0a0a0a;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.other {
            background: #2a2a2a;
            color: #e0e0e0;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message .sender {
            font-size: 0.75rem;
            font-weight: bold;
            margin-bottom: 4px;
            opacity: 0.7;
        }

        .message .time {
            font-size: 0.7rem;
            margin-top: 4px;
            opacity: 0.5;
        }

        .chat-input {
            padding: 16px 20px;
            background: #2a2a2a;
            border-top: 1px solid #3a3a3a;
            display: flex;
            gap: 12px;
        }

        .chat-input input {
            flex: 1;
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid #3a3a3a;
            border-radius: 24px;
            color: #e0e0e0;
            font-size: 16px;
        }

        .chat-input input:focus {
            outline: none;
            border-color: #00ff9d;
        }

        .chat-input button {
            padding: 8px 20px;
            background: #00ff9d;
            border: none;
            border-radius: 24px;
            color: #0a0a0a;
            font-weight: bold;
            cursor: pointer;
        }

        .loading, .info, .error {
            text-align: center;
            padding: 20px;
            color: #888;
        }

        .error {
            color: #ef4444;
        }

        .user-selection {
            background: #1f1f1f;
            border-bottom: 1px solid #3a3a3a;
            padding: 16px 20px;
        }

        .user-selection h3 {
            font-size: 0.9rem;
            margin-bottom: 12px;
            color: #888;
        }

        .user-list {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 4px;
        }

        .user-btn {
            padding: 8px 16px;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 20px;
            color: #e0e0e0;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .user-btn:hover, .user-btn.active {
            background: #00ff9d;
            color: #0a0a0a;
            border-color: #00ff9d;
        }

        @media (max-width: 768px) {
            #app {
                height: 95vh;
                border-radius: 16px;
            }

            .message {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <div id="app">Загрузка Speak...</div>

    <script src="https://cdn.jsdelivr.net/npm/libsodium-wrappers@0.7.13/dist/libsodium-wrappers.js"></script>
    <script src="app.js"></script>
</body>
</html>
