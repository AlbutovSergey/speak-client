<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speak — безопасный мессенджер</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #0a0a0a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { max-width: 500px; width: 100%; text-align: center; }
        h1 { font-size: 32px; margin-bottom: 10px; }
        .sub { color: #888; margin-bottom: 20px; }
        .login-area, .chat-area { background: #1a1a1a; padding: 30px; border-radius: 20px; margin-top: 20px; }
        input, button { padding: 14px; margin: 10px 0; width: 100%; border-radius: 12px; border: none; font-size: 16px; }
        input { background: #2c2c2e; color: white; }
        button { background: #007aff; color: white; font-weight: bold; cursor: pointer; }
        .switch-buttons { display: flex; gap: 10px; margin-bottom: 20px; }
        .switch-buttons button { background: #2c2c2e; }
        .switch-buttons .active { background: #007aff; }
        .message { background: #2c2c2e; padding: 12px; margin: 8px 0; border-radius: 12px; text-align: left; }
        .message.own { background: #007aff; }
        .chat-messages { max-height: 400px; overflow-y: auto; margin-bottom: 20px; }
        .status { color: #4cd964; font-size: 12px; margin-top: 10px; }
        .status.error { color: #ff3b30; }
        #logoutBtn { background: #ff3b30; margin-top: 10px; }
        .flex-row { display: flex; gap: 10px; }
        .flex-row input { flex: 1; }
        .flex-row button { width: auto; padding: 14px 24px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔒 Speak</h1>
        <div class="sub">Безопасный мессенджер</div>
        
        <div id="loginArea" class="login-area">
            <div class="switch-buttons">
                <button id="showLoginBtn" class="active">Вход</button>
                <button id="showRegisterBtn">Регистрация</button>
            </div>
            <div id="loginForm">
                <input type="text" id="loginUsername" placeholder="Логин">
                <input type="password" id="loginPassword" placeholder="Пароль">
                <button id="doLoginBtn">Войти</button>
            </div>
            <div id="registerForm" style="display:none;">
                <input type="text" id="regDisplayName" placeholder="Отображаемое имя">
                <input type="text" id="regUsername" placeholder="Логин (мин. 3 символа)">
                <input type="password" id="regPassword" placeholder="Пароль (мин. 6 символов)">
                <button id="doRegisterBtn">Зарегистрироваться</button>
            </div>
            <div id="status" class="status"></div>
        </div>
        
        <div id="chatArea" class="chat-area" style="display:none;">
            <div id="chatMessages" class="chat-messages">Загрузка...</div>
            <div class="flex-row">
                <input type="text" id="messageInput" placeholder="Сообщение...">
                <button id="sendBtn">→</button>
            </div>
            <button id="logoutBtn">Выйти</button>
        </div>
    </div>
    
    <script>
        const API_URL = 'https://speak-backend-b43k.onrender.com';
        
        let authToken = localStorage.getItem('speak_token');
        let currentUser = localStorage.getItem('speak_username');
        
        function showStatus(msg, isError = false) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = msg;
            statusDiv.className = isError ? 'status error' : 'status';
            setTimeout(() => {
                if (statusDiv.textContent === msg) statusDiv.textContent = '';
            }, 3000);
        }
        
        async function apiRequest(endpoint, method, body = null) {
            const headers = { 'Content-Type': 'application/json' };
            if (authToken) headers['Authorization'] = `Bearer ${authToken}`;
            
            const response = await fetch(`${API_URL}${endpoint}`, {
                method, headers,
                body: body ? JSON.stringify(body) : undefined
            });
            
            if (response.status === 401) {
                await logout();
                throw new Error('Сессия истекла');
            }
            return response;
        }
        
        async function register() {
            const displayName = document.getElementById('regDisplayName').value.trim();
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            
            if (!displayName) { showStatus('Введите отображаемое имя', true); return; }
            if (username.length < 3) { showStatus('Логин должен быть не менее 3 символов', true); return; }
            if (password.length < 6) { showStatus('Пароль должен быть не менее 6 символов', true); return; }
            
            try {
                showStatus('Регистрация...');
                const response = await apiRequest('/api/register', 'POST', {
                    username, password, displayName,
                    publicKey: 'temp-key',
                    signaturePublicKey: 'temp-sig',
                    signaturePrivateKey: 'temp-priv'
                });
                const data = await response.json();
                
                if (data.success) {
                    authToken = data.token;
                    currentUser = data.username;
                    localStorage.setItem('speak_token', authToken);
                    localStorage.setItem('speak_username', currentUser);
                    showStatus('Регистрация успешна!');
                    showChat();
                } else {
                    showStatus('Ошибка: ' + (data.error || 'Неизвестная ошибка'), true);
                }
            } catch (err) {
                console.error('Register error:', err);
                showStatus('Ошибка регистрации: ' + err.message, true);
            }
        }
        
        async function login() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            if (!username || !password) {
                showStatus('Заполните все поля', true);
                return;
            }
            
            try {
                showStatus('Вход...');
                const response = await apiRequest('/api/login', 'POST', { username, password });
                const data = await response.json();
                
                if (data.success) {
                    authToken = data.token;
                    currentUser = data.username;
                    localStorage.setItem('speak_token', authToken);
                    localStorage.setItem('speak_username', currentUser);
                    showStatus('Вход выполнен!');
                    showChat();
                } else {
                    showStatus('Ошибка: ' + (data.error || 'Неверный логин или пароль'), true);
                }
            } catch (err) {
                console.error('Login error:', err);
                showStatus('Ошибка входа: ' + err.message, true);
            }
        }
        
        async function logout() {
            if (authToken) {
                try { await apiRequest('/api/logout', 'POST'); } catch(e) {}
            }
            authToken = null;
            currentUser = null;
            localStorage.clear();
            document.getElementById('chatArea').style.display = 'none';
            document.getElementById('loginArea').style.display = 'block';
            showStatus('Вы вышли');
        }
        
        function showChat() {
            document.getElementById('loginArea').style.display = 'none';
            document.getElementById('chatArea').style.display = 'block';
            loadMessages();
            setInterval(loadMessages, 5000);
        }
        
        async function loadMessages() {
            if (!authToken) return;
            try {
                const response = await apiRequest('/api/messages', 'GET');
                const messages = await response.json();
                const chatDiv = document.getElementById('chatMessages');
                if (!messages || messages.length === 0) {
                    chatDiv.innerHTML = '<div style="text-align:center; color:#888; padding:20px;">💬 Нет сообщений</div>';
                } else {
                    chatDiv.innerHTML = messages.map(msg => `
                        <div class="message ${msg.sender_username === currentUser ? 'own' : ''}">
                            <strong>${msg.sender_display_name || msg.sender_username}:</strong><br>${msg.encrypted_payload || '[сообщение]'}
                        </div>
                    `).join('');
                }
            } catch (err) { console.error(err); }
        }
        
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;
            const recipient = prompt('Кому отправить? (логин)');
            if (!recipient) return;
            try {
                await apiRequest('/api/send_message', 'POST', {
                    recipientUsername: recipient,
                    encryptedPayload: text,
                    nonce: 'temp-nonce'
                });
                input.value = '';
                await loadMessages();
            } catch (err) { showStatus('Ошибка отправки', true); }
        }
        
        document.getElementById('showLoginBtn').onclick = () => {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('showLoginBtn').classList.add('active');
            document.getElementById('showRegisterBtn').classList.remove('active');
        };
        
        document.getElementById('showRegisterBtn').onclick = () => {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
            document.getElementById('showRegisterBtn').classList.add('active');
            document.getElementById('showLoginBtn').classList.remove('active');
        };
        
        document.getElementById('doLoginBtn').onclick = login;
        document.getElementById('doRegisterBtn').onclick = register;
        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('logoutBtn').onclick = logout;
        
        if (authToken && currentUser) {
            showChat();
        }
    </script>
</body>
</html>
