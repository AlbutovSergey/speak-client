<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Speak — безопасный мессенджер</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="theme-color" content="#000000">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0a; color: white; }
        .container { max-width: 600px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; }
        .header { padding: 20px; background: #1a1a1a; text-align: center; font-weight: bold; border-bottom: 1px solid #333; }
        .chat-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .message { max-width: 80%; padding: 10px 14px; border-radius: 18px; word-wrap: break-word; }
        .message.own { align-self: flex-end; background: #007aff; color: white; }
        .message.other { align-self: flex-start; background: #2c2c2e; }
        .input-area { display: flex; padding: 12px; gap: 8px; background: #1a1a1a; border-top: 1px solid #333; }
        .input-area input { flex: 1; padding: 12px; border-radius: 24px; border: none; background: #2c2c2e; color: white; font-size: 16px; }
        .input-area button { background: #007aff; border: none; padding: 12px 20px; border-radius: 24px; color: white; font-weight: bold; cursor: pointer; }
        .login-area { padding: 40px 20px; display: flex; flex-direction: column; gap: 20px; align-items: center; justify-content: center; height: 100vh; }
        .login-area input, .login-area button { padding: 12px; width: 100%; max-width: 300px; border-radius: 12px; border: none; font-size: 16px; }
        .login-area button { background: #007aff; color: white; font-weight: bold; cursor: pointer; }
        .contacts-area { padding: 20px; border-bottom: 1px solid #333; display: flex; gap: 10px; overflow-x: auto; }
        .contact-chip { background: #2c2c2e; padding: 8px 16px; border-radius: 20px; cursor: pointer; white-space: nowrap; }
        .contact-chip.active { background: #007aff; }
    </style>
</head>
<body>
    <div id="app"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/libsodium-wrappers/1.0.18/libsodium-wrappers.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
