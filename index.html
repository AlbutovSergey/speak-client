<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Speak — безопасный мессенджер</title>
    <meta name="theme-color" content="#000000">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; background: #0a0a0a; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        
        .header {
            padding: 12px 16px;
            background: #1a1a1a;
            border-bottom: 1px solid #2c2c2e;
            flex-shrink: 0;
            padding-top: max(12px, env(safe-area-inset-top));
        }
        
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .header h1 {
            font-size: 20px;
        }
        
        .sound-buttons {
            display: flex;
            gap: 8px;
        }
        
        .sound-buttons button {
            background: #2c2c2e;
            border: none;
            border-radius: 20px;
            padding: 6px 12px;
            color: white;
            font-size: 12px;
            cursor: pointer;
        }
        
        .user-info {
            font-size: 13px;
            color: #888;
            text-align: left;
        }
        
        .user-info span {
            color: #007aff;
        }
        
        .content-area {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .tab-content {
            flex: 1;
            overflow: hidden;
            display: none;
        }
        
        .tab-content.active {
            display: flex;
            flex-direction: column;
        }
        
        .contacts-page {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }
        
        .search-box {
            margin-bottom: 16px;
        }
        
        .search-box input {
            width: 100%;
            padding: 12px;
            border-radius: 24px;
            border: none;
            background: #2c2c2e;
            color: white;
            font-size: 14px;
            outline: none;
        }
        
        .search-results {
            background: #1a1a1a;
            border-radius: 12px;
            margin-bottom: 16px;
        }
        
        .search-result-item {
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid #2c2c2e;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .search-result-item:hover {
            background: #2c2c2e;
        }
        
        .search-result-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #2c2c2e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        
        .search-result-info {
            flex: 1;
        }
        
        .search-result-name {
            font-weight: bold;
            margin-bottom: 4px;
        }
        
        .search-result-username {
            font-size: 11px;
            color: #888;
        }
        
        .contacts-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .contact-card {
            display: flex;
            align-items: center;
            padding: 12px;
            background: #1a1a1a;
            border-radius: 12px;
            cursor: pointer;
            gap: 12px;
        }
        
        .contact-card:hover {
            background: #2c2c2e;
        }
        
        .contact-avatar {
            width: 48px;
            height: 48px;
            background: #2c2c2e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        
        .contact-card-info {
            flex: 1;
        }
        
        .contact-card-name {
            font-weight: bold;
            margin-bottom: 4px;
        }
        
        .contact-card-username {
            font-size: 11px;
            color: #888;
        }
        
        .delete-contact {
            color: #ff3b30;
            cursor: pointer;
            padding: 8px;
        }
        
        .add-contact-btn {
            margin-top: 16px;
            padding: 12px;
            background: #2c2c2e;
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        
        .chat-page {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .chat-header {
            padding: 12px 16px;
            background: #1a1a1a;
            border-bottom: 1px solid #2c2c2e;
            flex-shrink: 0;
            text-align: left;
        }
        
        .chat-header h3 {
            font-size: 16px;
            margin-bottom: 0;
        }
        
        .chat-header h3 span {
            color: #007aff;
        }
        
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .message {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 18px;
            word-wrap: break-word;
        }
        
        .message.own {
            align-self: flex-end;
            background: #007aff;
        }
        
        .message.other {
            align-self: flex-start;
            background: #2c2c2e;
        }
        
        .message-sender {
            font-size: 11px;
            color: #aaa;
            margin-bottom: 4px;
        }
        
        .message-text {
            font-size: 14px;
        }
        
        .message-time {
            font-size: 10px;
            color: rgba(255,255,255,0.6);
            margin-top: 4px;
            text-align: right;
        }
        
        /* Панель ввода сообщения */
        .input-area {
            padding: 12px 16px;
            background: #1a1a1a;
            border-top: 1px solid #2c2c2e;
            display: flex;
            gap: 10px;
            flex-shrink: 0;
            margin-bottom: 50px;
            position: relative;
            bottom: 10px;
        }
        
        .input-area input {
            flex: 1;
            padding: 12px;
            border-radius: 24px;
            border: none;
            background: #2c2c2e;
            color: white;
            font-size: 14px;
            outline: none;
        }
        
        .input-area input::placeholder {
            color: #666;
        }
        
        .input-area button {
            padding: 12px 20px;
            background: #007aff;
            border: none;
            border-radius: 24px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        
        .empty-state {
            text-align: center;
            color: #888;
            margin-top: 50px;
        }
        
             /* Нижние вкладки */
        .bottom-tabs {
            display: flex;
            background: #111111;
            border-top: 1px solid #2c2c2e;
            flex-shrink: 0;
            margin-bottom: env(safe-area-inset-bottom, 0);
            padding-bottom: env(safe-area-inset-bottom, 0);
            margin-top: -40px;
        }
        
        /* Для iPhone X, 11, 12, 13, 14, 15 с вырезом */
        @supports (padding: max(0px)) {
        .bottom-tabs {
                margin-top: -40px;
            }
        }
        
        .tab {
            flex: 1;
            padding: 14px;
            text-align: center;
            background: none;
            border: none;
            color: #888;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .tab.active {
            color: #007aff;
            border-top: 2px solid #007aff;
            background: #1a1a1a;
        }
        
        .status {
            color: #4cd964;
            font-size: 12px;
            margin-top: 10px;
            text-align: center;
        }
        
        .status.error {
            color: #ff3b30;
        }
        
        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100%;
            background: #0a0a0a;
        }
        
        .login-card {
            background: #1a1a1a;
            padding: 40px;
            border-radius: 20px;
            width: 350px;
            text-align: center;
        }
        
        .login-card h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .login-card .sub {
            color: #888;
            font-size: 14px;
            margin-bottom: 30px;
        }
        
        .login-card input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border-radius: 12px;
            border: none;
            background: #2c2c2e;
            color: white;
            font-size: 16px;
        }
        
        .login-card button {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border-radius: 12px;
            border: none;
            background: #007aff;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }
        
        .login-card button:hover {
            background: #0055bb;
        }
        
        .switch-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .switch-buttons button {
            background: #2c2c2e;
            margin: 0;
        }
        
        .switch-buttons .active {
            background: #007aff;
        }
    </style>
</head>
<body>
    <div id="app"></div>
    
    <script>
        // ============ НАСТРОЙКИ ============
        const API_URL = 'https://speak-backend-b43k.onrender.com';
        
        // ============ ЗВУКОВОЕ УВЕДОМЛЕНИЕ ============
        let audioContext = null;
        let lastMessageCount = 0;
        let soundEnabled = true;
        
        function playNotificationSound() {
            if (!soundEnabled) return;
            
            try {
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                
                if (audioContext.state === 'suspended') {
                    audioContext.resume();
                }
                
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.frequency.value = 880;
                gainNode.gain.value = 0.3;
                
                oscillator.start();
                gainNode.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.5);
                oscillator.stop(audioContext.currentTime + 0.5);
            } catch (err) {
                console.log('Audio not supported:', err);
            }
        }
        
        function enableSound() {
            soundEnabled = true;
            if (audioContext && audioContext.state === 'suspended') {
                audioContext.resume();
            }
            showStatus('🔔 Звук включён');
        }
        
        function disableSound() {
            soundEnabled = false;
            showStatus('🔕 Звук выключен');
        }
        
        // ============ ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ============
        let authToken = localStorage.getItem('speak_token');
        let currentUser = localStorage.getItem('speak_username');
        let currentNickname = localStorage.getItem('speak_nickname');
        let currentUserId = localStorage.getItem('speak_userId');
        let currentChat = localStorage.getItem('speak_current_chat') || null;
        let contacts = JSON.parse(localStorage.getItem('speak_contacts') || '[]');
        let currentTab = 'contacts';
        let searchTimeout = null;
        let messageLoadCount = 0;
        
        function formatNickname(name) {
            if (!name) return '';
            return name.startsWith('@') ? name : `@${name}`;
        }
        
        async function apiRequest(endpoint, method, body = null) {
            const headers = { 'Content-Type': 'application/json' };
            if (authToken) headers['Authorization'] = `Bearer ${authToken}`;
            
            const response = await fetch(`${API_URL}${endpoint}`, {
                method, headers,
                body: body ? JSON.stringify(body) : undefined
            });
            
            if (response.status === 401) {
                logout();
                throw new Error('Сессия истекла');
            }
            return response;
        }
        
        // ============ ПОИСК ПОЛЬЗОВАТЕЛЕЙ ============
        async function searchUsers(query) {
            if (!query || query.length < 2) return [];
            const cleanQuery = query.replace(/^@/, '');
            try {
                const response = await apiRequest('/api/users/search?q=' + encodeURIComponent(cleanQuery), 'GET');
                const users = await response.json();
                return users.filter(u => u.username !== currentUser);
            } catch (err) {
                console.error('Search error:', err);
                return [];
            }
        }
        
        function showSearchResults(results) {
            const resultsDiv = document.getElementById('searchResults');
            if (!resultsDiv) return;
            
            if (results.length === 0) {
                resultsDiv.innerHTML = '<div style="padding:10px; color:#888;">Пользователи не найдены</div>';
                resultsDiv.style.display = 'block';
                return;
            }
            
            resultsDiv.innerHTML = results.map(user => `
                <div class="search-result-item" onclick="addContactByUsername('${user.username}', '${user.display_name}')">
                    <div class="search-result-avatar">👤</div>
                    <div class="search-result-info">
                        <div class="search-result-name">${formatNickname(user.display_name || user.username)}</div>
                        <div class="search-result-username">${user.username}</div>
                    </div>
                </div>
            `).join('');
            resultsDiv.style.display = 'block';
        }
        
        async function addContactByUsername(username, nickname) {
            if (!username || username === currentUser) return;
            
            if (!contacts.includes(username)) {
                contacts.push(username);
                localStorage.setItem('speak_contacts', JSON.stringify(contacts));
                renderContactsPage();
                document.getElementById('searchInput').value = '';
                document.getElementById('searchResults').innerHTML = '';
                document.getElementById('searchResults').style.display = 'none';
                showStatus(`Контакт ${formatNickname(nickname || username)} добавлен`);
            } else {
                showStatus(`Контакт ${formatNickname(nickname || username)} уже есть`, true);
            }
        }
        
        function onSearchInput() {
            const input = document.getElementById('searchInput');
            const query = input?.value.trim();
            const resultsDiv = document.getElementById('searchResults');
            if (!resultsDiv) return;
            
            if (searchTimeout) clearTimeout(searchTimeout);
            
            if (!query || query.length < 2) {
                resultsDiv.innerHTML = '';
                resultsDiv.style.display = 'none';
                return;
            }
            
            searchTimeout = setTimeout(async () => {
                const results = await searchUsers(query);
                showSearchResults(results);
            }, 500);
        }
        
        // ============ РЕГИСТРАЦИЯ ============
        async function register() {
            let nickname = document.getElementById('regNickname').value.trim();
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            
            if (nickname && !nickname.startsWith('@')) {
                nickname = '@' + nickname;
            }
            
            if (!nickname) { alert('Введите псевдоним'); return; }
            if (username.length < 3) { alert('Логин должен быть не менее 3 символов'); return; }
            if (password.length < 6) { alert('Пароль должен быть не менее 6 символов'); return; }
            
            try {
                const response = await apiRequest('/api/register', 'POST', {
                    username, password, displayName: nickname,
                    publicKey: 'temp-key',
                    signaturePublicKey: 'temp-sig',
                    signaturePrivateKey: 'temp-priv'
                });
                const data = await response.json();
                
                if (data.success) {
                    authToken = data.token;
                    currentUser = data.username;
                    currentNickname = data.displayName;
                    currentUserId = data.userId;
                    localStorage.setItem('speak_token', authToken);
                    localStorage.setItem('speak_username', currentUser);
                    localStorage.setItem('speak_nickname', currentNickname);
                    localStorage.setItem('speak_userId', currentUserId);
                    location.reload();
                } else {
                    if (data.error === 'Username already exists') {
                        alert('Пользователь с таким логином уже существует');
                    } else if (data.error === 'This display name is already taken') {
                        alert('Этот псевдоним уже занят');
                    } else {
                        alert('Ошибка регистрации: ' + (data.error || 'Неизвестная ошибка'));
                    }
                }
            } catch (err) {
                alert('Ошибка соединения с сервером');
            }
        }
        
        // ============ ВХОД ============
        async function login() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            if (!username || !password) {
                alert('Заполните все поля');
                return;
            }
            
            try {
                const response = await apiRequest('/api/login', 'POST', { username, password });
                const data = await response.json();
                
                if (data.success) {
                    authToken = data.token;
                    currentUser = data.username;
                    currentNickname = data.display_name;
                    currentUserId = data.userId;
                    localStorage.setItem('speak_token', authToken);
                    localStorage.setItem('speak_username', currentUser);
                    localStorage.setItem('speak_nickname', currentNickname);
                    localStorage.setItem('speak_userId', currentUserId);
                    location.reload();
                } else {
                    alert('Неверный логин или пароль');
                }
            } catch (err) {
                alert('Ошибка соединения с сервером');
            }
        }
        
        // ============ ВЫХОД ============
        function logout() {
            localStorage.clear();
            location.reload();
        }
        
        // ============ ДОБАВИТЬ КОНТАКТ ============
        async function addContact() {
            const input = prompt('Введите @Псевдоним собеседника:');
            if (!input) return;
            
            const nicknameQuery = input.trim().replace(/^@/, '');
            if (!nicknameQuery) { showStatus('Введите псевдоним для поиска', true); return; }
            
            try {
                const response = await apiRequest('/api/users/search?q=' + encodeURIComponent(nicknameQuery), 'GET');
                const users = await response.json();
                const foundUser = users.find(u => 
                    u.display_name.toLowerCase() === '@' + nicknameQuery.toLowerCase() || 
                    u.display_name.toLowerCase() === nicknameQuery.toLowerCase()
                );
                
                if (!foundUser || foundUser.username === currentUser) {
                    showStatus('Пользователь не найден', true);
                    return;
                }
                
                if (!contacts.includes(foundUser.username)) {
                    contacts.push(foundUser.username);
                    localStorage.setItem('speak_contacts', JSON.stringify(contacts));
                    renderContactsPage();
                    showStatus(`Контакт ${formatNickname(foundUser.display_name)} добавлен`);
                } else {
                    showStatus(`Контакт ${formatNickname(foundUser.display_name)} уже есть`, true);
                }
            } catch (err) {
                showStatus('Ошибка поиска', true);
            }
        }
        
        function removeContact(username) {
            if (confirm(`Удалить контакт?`)) {
                contacts = contacts.filter(c => c !== username);
                localStorage.setItem('speak_contacts', JSON.stringify(contacts));
                if (currentChat === username) {
                    currentChat = null;
                    localStorage.removeItem('speak_current_chat');
                }
                renderContactsPage();
                showStatus('Контакт удалён');
            }
        }
        
        function showStatus(msg, isError = false) {
            const statusDiv = document.getElementById('status');
            if (statusDiv) {
                statusDiv.textContent = msg;
                statusDiv.className = isError ? 'status error' : 'status';
                setTimeout(() => {
                    if (statusDiv.textContent === msg) statusDiv.textContent = '';
                }, 3000);
            }
        }
        
        // ============ ОТПРАВКА СООБЩЕНИЯ ============
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !currentChat) return;
            
            try {
                await apiRequest('/api/send_message', 'POST', {
                    recipientUsername: currentChat,
                    encryptedPayload: text,
                    nonce: 'temp-nonce'
                });
                input.value = '';
                await loadMessages();
            } catch (err) {
                showStatus('Ошибка отправки', true);
            }
        }
        
        // ============ ЗАГРУЗКА СООБЩЕНИЙ ============
        async function loadMessages() {
            if (!authToken || !currentChat) return;
            
            try {
                const response = await apiRequest('/api/messages', 'GET');
                const allMessages = await response.json();
                
                const chatMessages = allMessages.filter(msg => 
                    (msg.sender_username === currentUser && msg.recipient_username === currentChat) ||
                    (msg.sender_username === currentChat && msg.recipient_username === currentUser)
                );
                
                if (messageLoadCount > 0 && chatMessages.length > messageLoadCount) {
                    const newMessages = chatMessages.slice(messageLoadCount);
                    const hasNewFromOther = newMessages.some(msg => msg.sender_username !== currentUser);
                    if (hasNewFromOther) {
                        playNotificationSound();
                    }
                }
                messageLoadCount = chatMessages.length;
                
                const messagesDiv = document.getElementById('messagesArea');
                if (!messagesDiv) return;
                
                if (chatMessages.length === 0) {
                    messagesDiv.innerHTML = '<div class="empty-state">💬 Нет сообщений<br>Напишите что-нибудь</div>';
                } else {
                    messagesDiv.innerHTML = chatMessages.map(msg => {
                        const isOwn = msg.sender_username === currentUser;
                        const senderName = isOwn ? 'Вы' : formatNickname(msg.sender_display_name || msg.sender_username);
                        let messageTime = '';
                        if (msg.timestamp) {
                            const date = new Date(parseInt(msg.timestamp));
                            messageTime = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                        }
                        return `
                            <div class="message ${isOwn ? 'own' : 'other'}">
                                <div class="message-sender">${senderName}</div>
                                <div class="message-text">${msg.encrypted_payload || '[сообщение]'}</div>
                                <div class="message-time">${messageTime}</div>
                            </div>
                        `;
                    }).join('');
                    messagesDiv.scrollTop = messagesDiv.scrollHeight;
                }
            } catch (err) {
                console.error('Load messages error:', err);
            }
        }
        
        // ============ ОТРИСОВКА СТРАНИЦЫ КОНТАКТОВ ============
        async function renderContactsPage() {
            const contactsContainer = document.getElementById('contactsList');
            if (!contactsContainer) return;
            
            if (contacts.length === 0) {
                contactsContainer.innerHTML = '<div style="text-align:center; color:#888; padding:20px;">Нет контактов<br>➕ Добавьте собеседника</div>';
                return;
            }
            
            const contactsWithNames = await Promise.all(contacts.map(async (contact) => {
                try {
                    const response = await apiRequest(`/api/user_info/${contact}`, 'GET');
                    const userInfo = await response.json();
                    return { username: contact, nickname: userInfo.display_name || contact };
                } catch (err) {
                    return { username: contact, nickname: contact };
                }
            }));
            
            contactsContainer.innerHTML = contactsWithNames.map(contact => `
                <div class="contact-card" onclick="selectChat('${contact.username}')">
                    <div class="contact-avatar">👤</div>
                    <div class="contact-card-info">
                        <div class="contact-card-name">${formatNickname(contact.nickname)}</div>
                        <div class="contact-card-username">${contact.username}</div>
                    </div>
                    <div class="delete-contact" onclick="event.stopPropagation(); removeContact('${contact.username}')">🗑️</div>
                </div>
            `).join('');
        }
        
        // ============ ВЫБОР ЧАТА ============
        async function selectChat(username) {
            currentChat = username;
            localStorage.setItem('speak_current_chat', username);
            currentTab = 'chats';
            
            messageLoadCount = 0;
            
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.getElementById('chatsTab').classList.add('active');
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.getElementById('chatsTabBtn').classList.add('active');
            
            let nickname = username;
            try {
                const token = localStorage.getItem('speak_token');
                const response = await fetch(`${API_URL}/api/user_info/${username}`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    }
                });
                if (response.ok) {
                    const userInfo = await response.json();
                    nickname = userInfo.display_name || username;
                }
            } catch (err) {
                console.error('Failed to get user info:', err);
            }
            
            document.getElementById('chatHeaderName').innerHTML = `Чат с <span>${formatNickname(nickname)}</span>`;
            
            const msgInput = document.getElementById('messageInput');
            const sendBtn = document.querySelector('#chatsTab .input-area button');
            if (msgInput) {
                msgInput.disabled = false;
                msgInput.placeholder = "Сообщение...";
                msgInput.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
            }
            if (sendBtn) sendBtn.disabled = false;
            
            await loadMessages();
            
            if (window.messageInterval) clearInterval(window.messageInterval);
            window.messageInterval = setInterval(async () => {
                if (currentChat) await loadMessages();
            }, 3000);
        }
        
        // ============ ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК ============
        function switchTab(tab) {
            currentTab = tab;
            
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(`${tab}Tab`).classList.add('active');
            
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`${tab}TabBtn`).classList.add('active');
            
            if (tab === 'contacts') {
                renderContactsPage();
            } else if (tab === 'chats') {
                if (currentChat) {
                    const msgInput = document.getElementById('messageInput');
                    const sendBtn = document.querySelector('#chatsTab .input-area button');
                    if (msgInput) {
                        msgInput.disabled = false;
                        msgInput.placeholder = "Сообщение...";
                        msgInput.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
                    }
                    if (sendBtn) sendBtn.disabled = false;
                    loadMessages();
                } else {
                    const msgInput = document.getElementById('messageInput');
                    const sendBtn = document.querySelector('#chatsTab .input-area button');
                    if (msgInput) {
                        msgInput.disabled = true;
                        msgInput.placeholder = "Выберите чат из списка контактов";
                    }
                    if (sendBtn) sendBtn.disabled = true;
                }
            }
        }
        
        // ============ ЭКРАН ВХОДА ============
        function renderLogin() {
            document.getElementById('app').innerHTML = `
                <div class="login-wrapper">
                    <div class="login-card">
                        <h1>🔒 Speak</h1>
                        <div class="sub">Безопасный мессенджер</div>
                        
                        <div class="switch-buttons">
                            <button id="showLoginBtn" class="active">Вход</button>
                            <button id="showRegisterBtn">Регистрация</button>
                        </div>
                        
                        <div id="loginForm">
                            <input type="text" id="loginUsername" placeholder="Логин" autocomplete="off">
                            <input type="password" id="loginPassword" placeholder="Пароль">
                            <button id="doLoginBtn">Войти</button>
                        </div>
                        
                        <div id="registerForm" style="display:none;">
                            <input type="text" id="regNickname" placeholder="Псевдоним" autocomplete="off">
                            <input type="text" id="regUsername" placeholder="Логин" autocomplete="off">
                            <input type="password" id="regPassword" placeholder="Пароль (мин. 6 символов)">
                            <button id="doRegisterBtn">Зарегистрироваться</button>
                        </div>
                        
                        <div id="status" class="status"></div>
                    </div>
                </div>
            `;
            
            document.getElementById('showLoginBtn').onclick = () => {
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('registerForm').style.display = 'none';
                document.getElementById('showLoginBtn').classList.add('active');
                document.getElementById('showRegisterBtn').classList.remove('active');
            };
            
            document.getElementById('showRegisterBtn').onclick = () => {
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('registerForm').style.display = 'block';
                document.getElementById('showRegisterBtn').classList.add('active');
                document.getElementById('showLoginBtn').classList.remove('active');
            };
            
            document.getElementById('doLoginBtn').onclick = login;
            document.getElementById('doRegisterBtn').onclick = register;
        }
        
        // ============ ОСНОВНОЙ ИНТЕРФЕЙС ============
function renderMainApp() {
    document.getElementById('app').innerHTML = `
        <div class="app-container">
            <div class="header">
                <div class="header-top">
                    <h1>🔒 Speak</h1>
                    <div class="sound-buttons">
                        <button onclick="enableSound()">🔔 Вкл</button>
                        <button onclick="disableSound()">🔕 Выкл</button>
                    </div>
                </div>
                <div class="user-info">Вы: <span>${formatNickname(currentNickname || currentUser)}</span> (${currentUser})</div>
            </div>
            
            <div class="content-area">
                <div id="contactsTab" class="tab-content active">
                    <div class="contacts-page">
                        <div class="search-box">
                            <input type="text" id="searchInput" placeholder="🔍 Поиск..." oninput="onSearchInput()">
                            <div id="searchResults" class="search-results" style="display:none;"></div>
                        </div>
                        <div id="contactsList" class="contacts-list"></div>
                        <button class="add-contact-btn" onclick="addContact()">➕ Добавить контакт</button>
                    </div>
                </div>
                
                <div id="chatsTab" class="tab-content">
                    <div class="chat-page">
                        <div class="chat-header">
                            <h3 id="chatHeaderName">Выберите чат</h3>
                        </div>
                        <div class="messages-area" id="messagesArea">
                            <div class="empty-state">👈 Перейдите в "Контакты" и выберите собеседника</div>
                        </div>
                        <div class="input-area">
                            <input type="text" id="messageInput" placeholder="Выберите чат из списка контактов" autocomplete="off" disabled>
                            <button onclick="sendMessage()" disabled>→</button>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="bottom-tabs">
                <button id="contactsTabBtn" class="tab active" onclick="switchTab('contacts')">👥 Контакты</button>
                <button id="chatsTabBtn" class="tab" onclick="switchTab('chats')">💬 Чаты</button>
                <button class="tab" onclick="logout()">🚪 Выйти</button>
            </div>
            
            <div id="status" class="status"></div>
        </div>
    `;
    
    renderContactsPage();
    
    if (currentChat) {
        const msgInput = document.getElementById('messageInput');
        const sendBtn = document.querySelector('#chatsTab .input-area button');
        if (msgInput) {
            msgInput.disabled = false;
            msgInput.placeholder = "Сообщение...";
            msgInput.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
        }
        if (sendBtn) sendBtn.disabled = false;
        document.getElementById('chatHeaderName').innerHTML = `Чат с <span>${formatNickname(currentNickname || currentChat)}</span>`;
        loadMessages();
        if (window.messageInterval) clearInterval(window.messageInterval);
        window.messageInterval = setInterval(async () => {
            if (currentChat) await loadMessages();
        }, 3000);
    }
}
        // ============ ЗАПУСК ============
        document.body.addEventListener('click', () => {
            if (audioContext && audioContext.state === 'suspended') {
                audioContext.resume();
            }
        }, { once: true });
        
        if (authToken && currentUser) {
            renderMainApp();
        } else {
            renderLogin();
        }
        
        window.register = register;
        window.login = login;
        window.logout = logout;
        window.addContact = addContact;
        window.addContactByUsername = addContactByUsername;
        window.removeContact = removeContact;
        window.sendMessage = sendMessage;
        window.selectChat = selectChat;
        window.onSearchInput = onSearchInput;
        window.switchTab = switchTab;
        window.enableSound = enableSound;
        window.disableSound = disableSound;
    </script>
</body>
</html>
