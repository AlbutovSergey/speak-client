<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Speak — безопасный мессенджер</title>
    <meta name="theme-color" content="#000000">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        .sub {
            color: #888;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .login-area, .chat-area {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 20px;
            margin-top: 20px;
        }
        input, button {
            padding: 14px;
            margin: 10px 0;
            width: 100%;
            border-radius: 12px;
            border: none;
            font-size: 16px;
        }
        input {
            background: #2c2c2e;
            color: white;
        }
        button {
            background: #007aff;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover {
            background: #0055bb;
        }
        .switch-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .switch-buttons button {
            background: #2c2c2e;
        }
        .switch-buttons .active {
            background: #007aff;
        }
        .message {
            background: #2c2c2e;
            padding: 12px;
            margin: 8px 0;
            border-radius: 12px;
            text-align: left;
        }
        .message.own {
            background: #007aff;
        }
        .chat-messages {
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 20px;
        }
        .status {
            color: #4cd964;
            font-size: 12px;
            margin-top: 10px;
        }
        .status.error {
            color: #ff3b30;
        }
        #logoutBtn {
            background: #ff3b30;
            margin-top: 10px;
        }
        #logoutBtn:hover {
            background: #cc0000;
        }
        .flex-row {
            display: flex;
            gap: 10px;
        }
        .flex-row input {
            flex: 1;
        }
        .flex-row button {
            width: auto;
            padding: 14px 24px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔒 Speak</h1>
        <div class="sub">Безопасный мессенджер</div>
        
        <!-- Форма входа/регистрации -->
        <div id="loginArea" class="login-area">
            <div class="switch-buttons">
                <button id="showLoginBtn" class="active">Вход</button>
                <button id="showRegisterBtn">Регистрация</button>
            </div>
            
            <div id="loginForm">
                <input type="text" id="loginUsername" placeholder="Логин" autocomplete="off">
                <input type="password" id="loginPassword" placeholder="Пароль">
                <button id="doLoginBtn">Войти</button>
            </div>
            
            <div id="registerForm" style="display:none;">
                <input type="text" id="regDisplayName" placeholder="Отображаемое имя" autocomplete="off">
                <input type="text" id="regUsername" placeholder="Логин (мин. 3 символа)" autocomplete="off">
                <input type="password" id="regPassword" placeholder="Пароль (мин. 6 символов)">
                <button id="doRegisterBtn">Зарегистрироваться</button>
            </div>
            
            <div id="status" class="status"></div>
        </div>
        
        <!-- Чат -->
        <div id="chatArea" class="chat-area" style="display:none;">
            <div id="chatMessages" class="chat-messages">
                <div style="text-align:center; color:#888; padding:20px;">Загрузка сообщений...</div>
            </div>
            <div class="flex-row">
                <input type="text" id="messageInput" placeholder="Сообщение..." autocomplete="off">
                <button id="sendBtn">→</button>
            </div>
            <button id="logoutBtn">Выйти</button>
        </div>
    </div>
    
    <script>
        // ============ НАСТРОЙКИ ============
        // ⚠️ ВАЖНО: Замените на адрес ВАШЕГО сервера (Worker)
        // После создания Worker на Cloudflare, вставьте его адрес сюда
        const API_URL = 'https://speak-backend.ваш-аккаунт.workers.dev';
        
        // ============ ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ============
        let authToken = localStorage.getItem('speak_token');
        let currentUser = localStorage.getItem('speak_username');
        let currentDisplayName = localStorage.getItem('speak_displayName');
        
        // ============ ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ============
        function showStatus(msg, isError = false) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = msg;
            statusDiv.className = isError ? 'status error' : 'status';
            setTimeout(() => {
                if (statusDiv.textContent === msg) statusDiv.textContent = '';
            }, 3000);
        }
        
        // ============ API ЗАПРОСЫ ============
        async function apiRequest(endpoint, method, body = null) {
            const headers = {
                'Content-Type': 'application/json'
            };
            if (authToken) {
                headers['Authorization'] = `Bearer ${authToken}`;
            }
            
            const response = await fetch(`${API_URL}${endpoint}`, {
                method,
                headers,
                body: body ? JSON.stringify(body) : undefined
            });
            
            if (response.status === 401) {
                await logout();
                throw new Error('Сессия истекла');
            }
            return response;
        }
        
        // ============ АВТОРИЗАЦИЯ ============
        async function register() {
            const displayName = document.getElementById('regDisplayName').value.trim();
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            
            if (!displayName) {
                showStatus('Введите отображаемое имя', true);
                return;
            }
            if (username.length < 3) {
                showStatus('Логин должен быть не менее 3 символов', true);
                return;
            }
            if (password.length < 6) {
                showStatus('Пароль должен быть не менее 6 символов', true);
                return;
            }
            
            try {
                showStatus('Регистрация...');
                const response = await apiRequest('/api/register', 'POST', {
                    username,
                    password,
                    displayName,
                    publicKey: 'temp-key-' + Date.now(),
                    signaturePublicKey: 'temp-sig-key',
                    signaturePrivateKey: 'temp-priv-key'
                });
                const data = await response.json();
                
                if (data.success) {
                    authToken = data.token;
                    currentUser = data.username;
                    currentDisplayName = data.displayName;
                    localStorage.setItem('speak_token', authToken);
                    localStorage.setItem('speak_username', currentUser);
                    localStorage.setItem('speak_displayName', currentDisplayName);
                    showStatus('Регистрация успешна!');
                    showChat();
                } else {
                    showStatus('Ошибка: ' + (data.error || 'Неизвестная ошибка'), true);
                }
            } catch (err) {
                console.error('Register error:', err);
                showStatus('Ошибка регистрации: ' + err.message, true);
            }
        }
        
        async function login() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            if (!username || !password) {
                showStatus('Заполните все поля', true);
                return;
            }
            
            try {
                showStatus('Вход...');
                const response = await apiRequest('/api/login', 'POST', { username, password });
                const data = await response.json();
                
                if (data.success) {
                    authToken = data.token;
                    currentUser = data.username;
                    currentDisplayName = data.display_name || username;
                    localStorage.setItem('speak_token', authToken);
                    localStorage.setItem('speak_username', currentUser);
                    localStorage.setItem('speak_displayName', currentDisplayName);
                    showStatus('Вход выполнен!');
                    showChat();
                } else {
                    showStatus('Ошибка: ' + (data.error || 'Неверный логин или пароль'), true);
                }
            } catch (err) {
                console.error('Login error:', err);
                showStatus('Ошибка входа: ' + err.message, true);
            }
        }
        
        async function logout() {
            if (authToken) {
                try {
                    await apiRequest('/api/logout', 'POST');
                } catch(e) {}
            }
            authToken = null;
            currentUser = null;
            currentDisplayName = null;
            localStorage.removeItem('speak_token');
            localStorage.removeItem('speak_username');
            localStorage.removeItem('speak_displayName');
            document.getElementById('chatArea').style.display = 'none';
            document.getElementById('loginArea').style.display = 'block';
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
            document.getElementById('regDisplayName').value = '';
            document.getElementById('regUsername').value = '';
            document.getElementById('regPassword').value = '';
            showStatus('Вы вышли из системы');
        }
        
        // ============ ЧАТ ============
        function showChat() {
            document.getElementById('loginArea').style.display = 'none';
            document.getElementById('chatArea').style.display = 'block';
            loadMessages();
        }
        
        async function loadMessages() {
            if (!authToken) return;
            try {
                const response = await apiRequest('/api/messages', 'GET');
                const messages = await response.json();
                const chatDiv = document.getElementById('chatMessages');
                
                if (!messages || messages.length === 0) {
                    chatDiv.innerHTML = '<div style="text-align:center; color:#888; padding:20px;">💬 Нет сообщений</div>';
                } else {
                    chatDiv.innerHTML = messages.map(msg => `
                        <div class="message ${msg.sender_username === currentUser ? 'own' : ''}">
                            <strong>${msg.sender_display_name || msg.sender_username}:</strong><br>
                            ${msg.encrypted_payload || '[сообщение]'}
                            <div style="font-size: 10px; color:#666; margin-top: 5px;">${msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString() : ''}</div>
                        </div>
                    `).join('');
                    chatDiv.scrollTop = chatDiv.scrollHeight;
                }
            } catch (err) {
                console.error('Load messages error:', err);
            }
        }
        
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;
            
            const recipient = prompt('Кому отправить? (логин получателя)');
            if (!recipient) return;
            
            try {
                showStatus('Отправка...');
                await apiRequest('/api/send_message', 'POST', {
                    recipientUsername: recipient,
                    encryptedPayload: text,
                    nonce: 'temp-nonce-' + Date.now()
                });
                input.value = '';
                showStatus('Сообщение отправлено!');
                await loadMessages();
            } catch (err) {
                console.error('Send error:', err);
                showStatus('Ошибка отправки: ' + err.message, true);
            }
        }
        
        // ============ НАВЕШИВАНИЕ ОБРАБОТЧИКОВ ============
        document.getElementById('showLoginBtn').onclick = () => {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('showLoginBtn').classList.add('active');
            document.getElementById('showRegisterBtn').classList.remove('active');
        };
        
        document.getElementById('showRegisterBtn').onclick = () => {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
            document.getElementById('showRegisterBtn').classList.add('active');
            document.getElementById('showLoginBtn').classList.remove('active');
        };
        
        document.getElementById('doLoginBtn').onclick = login;
        document.getElementById('doRegisterBtn').onclick = register;
        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('logoutBtn').onclick = logout;
        
        // Обработка Enter в полях ввода
        document.getElementById('loginPassword').onkeypress = (e) => {
            if (e.key === 'Enter') login();
        };
        document.getElementById('regPassword').onkeypress = (e) => {
            if (e.key === 'Enter') register();
        };
        document.getElementById('messageInput').onkeypress = (e) => {
            if (e.key === 'Enter') sendMessage();
        };
        
        // Автовход при загрузке
        if (authToken && currentUser) {
            showChat();
            // Обновляем сообщения каждые 5 секунд
            setInterval(loadMessages, 5000);
        }
    </script>
</body>
</html>
